# ── 工作流一：问题分析提炼 ──
data_analysis_task:
  description: >
    使用 Excel Issue Analyzer 工具读取 {excel_path}。
    注意：使用 BugTracker 工具过滤，只分析 {new_count} 条未分析过的新问题和
    状态变更的问题，跳过 {skipped_count} 条已分析且状态未变的问题。
    输出必须包含：
    1. 字段映射（自动识别每个标准字段对应的 Excel 列名）
    2. 数据总量、字段缺失统计
    3. Status / Severity / Module / Frequency 分布
    4. 根因分类统计（按 11 类规则自动归类：SAIL/safetymonitor、IDPS、心跳握手、
       内存问题、Android应用层、电源供电、软件配置、NOC Error/DDR、io-sock/emac、
       测试环境、无法复现）
    5. 修复状态分组（已修复 / 未修复/挂起 / 无法复现）
    6. 各根因大类下的完整 Bug 清单（Bug ID、标题、根因、修复方式、状态、关联Case标签）
    7. Module x Severity / Module x 根因分类 / 根因分类 x 修复状态 交叉统计
    8. 典型 Bug 样例
    9. 给后续 Agent 的分析提示
  expected_output: >
    一份结构化 Markdown 摘要，包含上述所有字段和分析结果。每条 Bug 必须带 _root_cause_category
    （根因分类）和 _fix_status（修复状态）标签。
  agent: data_analyst

issue_refinement_task:
  description: >
    基于 data_analyst 的结构化摘要，整理出标准报告的前三章。

    ## 第一章：已修复的问题及原因
    按根因大类分组，每组的表格格式为：
    | Bug ID | 问题现象 | 根因 | 修复方式 |
    分组顺序：
    1. 系统异常进9008（高通底层，影响范围最大）
    2. 系统异常进900E（系统异常，影响范围最大）
    3. 产生gcore
    4. SAIL/safetymonitor 异常类（高通底层，影响范围最大）
    5. IDPS / QNX Kernel Crash 类
    6. 心跳/握手/通信异常类
    7. DDR/UFS/内存问题类
    8. Android 应用层问题
    9. Android framework层问题
    10. 电源/供电问题
    11. 软件配置/升级问题
    12. 其他已修复（不属于以上大类的零散已修复 Bug）

    ## 第二章：未修复/挂起的问题
    表格格式为：
    | Bug ID | 状态 | 问题现象 | 当前卡点 |
    需区分 Postpone（挂起）和 Test（实际依赖外部未关闭）。
    每个卡点需说明阻塞原因（如依赖高通、日志不全、需特殊环境等）。

    ## 第三章：核心问题分类统计
    表格格式为：
    | 根因大类 | 数量 | 占比 | 处理状态 |
    占比 = 该大类 Bug 数 / 总 Bug 数 × 100%。
    处理状态说明当前收敛情况（已修复/依赖高通/挂起等）。
    最后要计算「无法复现率 = 无法复现数 / 总 Bug 数 × 100%」。
  expected_output: >
    完整的 Markdown 格式输出，包含第一章、第二章、第三章的全部内容。
    Bug 数据直接从 data_analyst 的结构化摘要中提取，不要编造不存在的数据。
  agent: issue_refiner

report_task:
  description: >
    基于前两个任务的输出，生成最终《黑卡闪问题提炼分析报告》。

    报告结构（严格按此格式）：

    ```
    # 黑卡闪问题提炼分析

    > 数据来源：{excel_path}
    > 状态说明：Closed=已关闭/已验证 | Test=修复后待验证 | Postpone=挂起(依赖外部/无法复现)
    > 增量模式：本次新分析 {new_count} 条，跳过已分析 {skipped_count} 条

    ---

    ## 一、已修复的问题及原因
    （直接使用 issue_refiner 第一章的输出）

    ## 二、未修复/挂起的问题
    （直接使用 issue_refiner 第二章的输出）

    ## 三、核心问题分类统计
    （直接使用 issue_refiner 第三章的输出）

    ## 四、需要提炼的经验点
    从已分类的 Bug 中识别模式和经验教训。提炼规则：
    - P0：同一根因 >= 3 条独立 Bug → 必须提炼，标注为 High
    - P1：同一根因 >= 2 条且影响 Case 7 → 提炼
    - P2：同一根因 >= 2 条跨模块 → 提炼
    - P3：单一 Bug 但根因典型 → 可选
    经验格式：### 经验N：标题\n- **现象：**\n- **痛点/根因：**\n- **建议：**

    ## 五、总结
    | 维度 | 结论 |
    |------|------|
    | **已修复** | 哪些大类基本收敛 |
    | **未修复/卡点** | 残留风险 |
    | **最大风险** | 影响面最大的问题 |
    | **最需改进** | 流程/工具/架构改进项 |
    | **工具建设** | 工具链建议 |

    ```

    **要求：**
    - 不要用代码块包裹整个报告
    - 表格格式严格对齐
    - 每条经验必须关联具体 Bug ID
    - 禁止编造 Excel 中不存在的字段或 Bug
  expected_output: >
    Markdown 格式的完整《黑卡闪问题提炼分析报告》，符合上述五段式结构。
  agent: report_writer
  output_file: outputs/report_refined.md

# ── 工作流二：Analysis 状态问题下载分析 ──
download_logs_task:
  description: >
    从 Excel 中筛选 status=Analysis 的问题（使用 BugTracker 过滤已下载过的）。
    对每个问题：
    1. 从 Actual Result 列提取日志 NAS 路径
    2. 使用 LogDownloadTool 检查权限并下载
    3. 无权限的记录下来，不阻塞流程

    输出格式：
    ```
    ## 日志下载结果

    | Bug ID | 标题 | 状态 | 文件数 |
    |--------|------|------|--------|
    | BUG-xxx | ... | ✅ 已下载 | 185 |
    | BUG-yyy | ... | ❌ 无权限 | - |
    ```

    下载到 T1Q黑卡闪问题分析/{BugID}_{问题描述}/ 目录。
  expected_output: >
    下载结果汇总表 + 各问题下载状态。下载完成后列出所有本地日志目录的路径。
  agent: log_downloader

analyze_mcu_task:
  description: >
    分析已下载日志的 MCU 层（mcu/、mcu_security/、vehicle_spi_log/ 目录）。

    检查项：
    - pshold 是否被拉低（pshold=0 → MCU 触发复位）
    - SPI 通信心跳消息 5501/80 是否缺失
    - MCU 功能安全事件（safety fault）
    - 电源状态异常

    如果发现明确的根因 → 直接输出结论，标注 layer=MCU，不需要后续 QNX/Android 分析。
    如果 MCU 层正常 → 输出"MCU 层未发现异常，继续 QNX 分析"。
  expected_output: >
    MCU 层分析结果：发现的问题 / 或 "未发现异常"。如果发现根因则给出结论和置信度。
  agent: log_analyzer_mcu

analyze_qnx_task:
  description: >
    分析已下载日志的 QNX 层（qnx/、qnx_security/、kernellog/ 目录）。
    仅在 MCU 层未发现根因时执行。

    检查项：
    - SAIL/safetymonitor 75ms 响应超时
    - IDPS/Kernel crash 事件
    - emac/io-sock 驱动异常（寻找 io-sock.cor 文件）
    - NOC Error / DDR 错误
    - 系统启动时序异常

    如果发现明确的根因 → 直接输出结论，标注 layer=QNX。
    如果 QNX 层正常 → 输出"QNX 层未发现异常，继续 Android 分析"。
  expected_output: >
    QNX 层分析结果：发现的问题 / 或 "未发现异常"。如果发现根因则给出结论和置信度。
  agent: log_analyzer_qnx

analyze_android_task:
  description: >
    分析已下载日志的 Android 层（logcat/、anr/、tombstones/ 目录）。
    仅在 MCU 和 QNX 层均未发现根因时执行。

    检查项：
    - ANR traces → 哪个组件超时
    - Native Crash tombstones → signal + backtrace
    - SurfaceFlinger 异常（Too many open files → FD 泄漏）
    - Java Crash（FATAL EXCEPTION、NullPointerException）
    - ContentObserver 泄漏
    - PAG/动画库异常
    - 应用进程 freeze/冻结

    综合 MCU/QNX/Android 三层分析结果，给出最终根因推断和置信度。
  expected_output: >
    Android 层分析结果 + 三层次综合分析结论（含置信度：高/中/低）。
  agent: log_analyzer_android

publish_report_task:
  description: >
    汇总所有分析结果，生成 Markdown 格式的分析报告。

    报告模板：
    ```
    # 黑卡闪问题日志分析报告

    ## 基本信息
    - Bug ID: {bug_id}
    - 标题: {title}
    - 负责人: {assignee}
    - 问题时间: {timestamp}

    ## 分析结论
    - 根因分类: {category}
    - 根因描述: {root_cause}
    - 置信度: {confidence}（高/中/低）
    - 定位层次: {layer}（MCU/QNX/Android）

    ## 分层分析详情
    ### MCU 层
    {mcu_findings}

    ### QNX 层
    {qnx_findings}

    ### Android 层
    {android_findings}

    ## 关键证据
    {evidence}

    ## 建议对策
    {recommendations}

    ## 待确认事项
    {open_items}
    ```

    报告保存到 reports/{bug_id}_analysis.md。
  expected_output: >
    完整的分析报告 Markdown 文件路径。
  agent: report_publisher
  output_file: reports/{bug_id}_analysis.md
