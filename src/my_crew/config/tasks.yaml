data_analysis_task:
  description: >
    使用 Excel Issue Analyzer 工具读取 {excel_path}。
    输出必须包含：
    1. 字段映射（自动识别每个标准字段对应的 Excel 列名）
    2. 数据总量、字段缺失统计
    3. Status / Severity / Module / Frequency 分布
    4. 根因分类统计（按 11 类规则自动归类：SAIL/safetymonitor、IDPS、心跳握手、
       内存问题、Android应用层、电源供电、软件配置、NOC Error/DDR、io-sock/emac、
       测试环境、无法复现）
    5. 修复状态分组（已修复 / 未修复/挂起 / 无法复现）
    6. 各根因大类下的完整 Bug 清单（Bug ID、标题、根因、修复方式、状态、关联Case标签）
    7. Module x Severity / Module x 根因分类 / 根因分类 x 修复状态 交叉统计
    8. 典型 Bug 样例
    9. 给后续 Agent 的分析提示
  expected_output: >
    一份结构化 Markdown 摘要，包含上述所有字段和分析结果。每条 Bug 必须带 _root_cause_category
    （根因分类）和 _fix_status（修复状态）标签。
  agent: data_analyst

issue_refinement_task:
  description: >
    基于 data_analyst 的结构化摘要，整理出标准报告的前三章。

    ## 第一章：已修复的问题及原因
    按根因大类分组，每组的表格格式为：
    | Bug ID | 问题现象 | 根因 | 修复方式 |
    分组顺序：
    1. 系统异常进9008（高通底层，影响范围最大）
    2. 系统异常进900E（系统异常，影响范围最大）
    3. 产生gcore
    4. SAIL/safetymonitor 异常类（高通底层，影响范围最大）
    5. IDPS / QNX Kernel Crash 类
    6. 心跳/握手/通信异常类
    7. DDR/UFS/内存问题类
    8. Android 应用层问题
    9. Android framework层问题
    10. 电源/供电问题
    11. 软件配置/升级问题
    12. 其他已修复（不属于以上大类的零散已修复 Bug）

    ## 第二章：未修复/挂起的问题
    表格格式为：
    | Bug ID | 状态 | 问题现象 | 当前卡点 |
    需区分 Postpone（挂起）和 Test（实际依赖外部未关闭）。
    每个卡点需说明阻塞原因（如依赖高通、日志不全、需特殊环境等）。

    ## 第三章：核心问题分类统计
    表格格式为：
    | 根因大类 | 数量 | 占比 | 处理状态 |
    占比 = 该大类 Bug 数 / 总 Bug 数 × 100%。
    处理状态说明当前收敛情况（已修复/依赖高通/挂起等）。
    最后要计算「无法复现率 = 无法复现数 / 总 Bug 数 × 100%」。
  expected_output: >
    完整的 Markdown 格式输出，包含第一章、第二章、第三章的全部内容。
    Bug 数据直接从 data_analyst 的结构化摘要中提取，不要编造不存在的数据。
  agent: issue_refiner

report_task:
  description: >
    基于前两个任务的输出，生成最终《黑卡闪问题提炼分析报告》。

    报告结构（严格按此格式）：

    ```
    # 黑卡闪问题提炼分析

    > 数据来源：{excel_path}
    > 状态说明：Closed=已关闭/已验证 | Test=修复后待验证 | Postpone=挂起(依赖外部/无法复现)

    ---

    ## 一、已修复的问题及原因
    （直接使用 issue_refiner 第一章的输出）

    ## 二、未修复/挂起的问题
    （直接使用 issue_refiner 第二章的输出）

    ## 三、核心问题分类统计
    （直接使用 issue_refiner 第三章的输出）

    ## 四、需要提炼的经验点
    从已分类的 Bug 中识别模式和经验教训。提炼规则：
    - P0：同一根因 >= 3 条独立 Bug → 必须提炼，标注为 High
    - P1：同一根因 >= 2 条且影响 Case 7 → 提炼
    - P2：同一根因 >= 2 条跨模块 → 提炼
    - P3：单一 Bug 但根因典型 → 可选
    经验格式：### 经验N：标题\n- **现象：**\n- **痛点/根因：**\n- **建议：**

    以下经验可参考（根据实际数据判断是否适用）：
    1. 系统异常进9008
    2. 系统异常进900E
    3. SAIL/safetymonitor 是最大单点风险
    4. gcore 抓取不完整阻塞分析
    5. 功能安全心跳握手容错设计不足
    6. 三方代码共板风险
    7. 电源/环境因素排除
    8. 应用层→系统层传导链
    9. SPI/MCU 复位码解析
    10. 偶现问题验证策略
    11. IDPS 模块早期风险
    12. 日志完整性

    ## 五、总结
    | 维度 | 结论 |
    |------|------|
    | **已修复** | 哪些大类基本收敛 |
    | **未修复/卡点** | 残留风险 |
    | **最大风险** | 影响面最大的问题 |
    | **最需改进** | 流程/工具/架构改进项 |
    | **工具建设** | 工具链建议 |

    ```

    **要求：**
    - 不要用代码块包裹整个报告
    - 表格格式严格对齐
    - 每条经验必须关联具体 Bug ID
    - 禁止编造 Excel 中不存在的字段或 Bug
  expected_output: >
    Markdown 格式的完整《黑卡闪问题提炼分析报告》，符合上述五段式结构。
  agent: report_writer
