# ── 工作流一：问题分析提炼 ──
data_analysis_task:
  description: >
    使用 Excel Issue Analyzer 工具读取 {excel_path}，传参：
    - tracking_file=black_screen_data/analyzed_bugs.json（知识库自动回写，相对路径）
    - json_output=outputs/classification_data.json（结构化分类数据，供下游 Agent 精确引用）

    **增量模式（重要）:**
    本次增量过滤：新增 {new_count} 条、状态变更 {changed_count} 条、已分析跳过 {skipped_count} 条。
    - 工具会自动分类全部 {total_count} 条（获取完整统计），但你的**分析重点**应放在新增和变更的问题上
    - 已分析的 {skipped_count} 条只更新统计数字（分布/交叉表），不要逐条重新详述

    输出必须包含：
    1. 字段映射（自动识别每个标准字段对应的 Excel 列名，含 Solved Scheme / Actual Result）
    2. 数据总量、字段缺失统计
    3. Status / Severity / Module / Frequency 分布
    4. 25类细粒度根因分类统计（ExcelIssueTool 内置加权分类引擎自动完成，
       覆盖应用crash/QNX/硬件/系统/环境/场景六大领域，详见 models.py 的 CATEGORY_DEFINITIONS）
    5. 修复状态分组（已修复 / 未修复/挂起 / 无法复现）
    6. 各根因大类下 Bug 清单（每类最多展示前 15 条为例，全量见 classification_data.json）
    7. Module x Severity / Module x 根因分类 / 根因分类 x 修复状态 交叉统计
    8. 典型 Bug 样例
    9. 给后续 Agent 的分析提示（含方案B精校指引）
  expected_output: >
    一份结构化 Markdown 摘要，包含上述所有字段和分析结果。每条 Bug 必须带 _root_cause_category
    （25类细粒度根因分类）和 _fix_status（修复状态）标签。
  agent: data_analyst
  output_file: outputs/data_analysis_summary.md

issue_refinement_task:
  description: >
    基于 data_analyst 的结构化摘要，做两件事：

    **增量模式（重要）:**
    本次增量过滤结果见 outputs/classification_data.json 中的 new_count/changed_count/skipped_count 字段。
    - 【第一部分】LLM 精校：只精校新增和状态变更的问题，已分析的条目保持原有分类不变
    - 【第二部分】报告前三章：第一章和第二章聚焦新增+变更的问题详情，已分析的只更新统计汇总

    【第一部分：LLM 二次精校分类（方案B）】
    逐条审核 data_analyst 输出的 `_root_cause_category` 分类结果，判断是否需要修正。
    **只审核新增的条目和状态变更的条目**，已分析的条目不需要重新精校。
    精确分类数据见 `outputs/classification_data.json`（每条 Bug 的 root_cause_category、matched_keywords、
    parsed_root_cause、fix_status 等结构化字段，避免从 Markdown 推测）。
    25类细粒度分类完整定义见 models.py 的 CATEGORY_DEFINITIONS，共26条（含"其他/待分类"）。
    命中关键词见 ExcelIssueTool 内置加权规则引擎。

    **精校步骤（严格按顺序）：**
    步骤1: 先调用「经验库检索」工具，以当前项目名称 + Bug 摘要为入参，获取 top3 历史经验作为分类参考。
    步骤2: 结合历史经验和 25 类规则，对每条 Bug 做分类判断，给出置信度（高/中/低）和依据。
    （经验库写入由独立的 experience_save_task 负责，本任务只做精校分类）

    精校原则：
    - 如果工具分类正确 → 确认保留
    - 如果工具分类错误（如"不是SAIL问题"被误分到SAIL类）→ 纠正
    - 如果原分类太粗、有更细的合适分类 → 细化
    - 如果原分类是"需人工判断"但有明确线索 → 给出合理分类
    - 每条给出置信度（高/中/低）和判断依据原文片段
    - 低置信度的标注"建议人工复核"

    【第二部分：整理标准报告前三章】
    基于精校后的分类结果，整理出标准报告的前三章。

    ## 第一章：已修复的问题及原因（精校后分类）
    按根因大类分组，下表展示每个分类下状态为 Closed/Test/Release/Review 等已关闭的问题。
    每个分组下展示该分类**前 15 条示例 Bug**（全量清单由后处理脚本生成附录）。
    每组的表格格式为：
    | Bug ID | 问题现象 | 根因 | 修复方式 |
    分组顺序：
    1. 系统异常进9008（高通底层，影响范围最大）
    2. 系统异常进900E（系统异常，影响范围最大）
    3. 产生gcore
    4. SAIL/safetymonitor 异常类
    5. IDPS / QNX Kernel Crash 类
    6. 心跳/握手/通信异常类
    7. DDR/UFS/内存问题类
    8. Android 应用层问题
    9. Android framework层问题
    10. 电源/供电问题
    11. 软件配置/升级问题
    12. 其他已修复（不属于以上大类的零散已修复 Bug）

    ## 第二章：未修复/挂起的问题（精校后分类）
    | Bug ID | 状态 | 问题现象 | 当前卡点 |
    每组的 Bug 清单表格（最多展示该分类前 15 条为例，全量由后处理脚本生成）。
    需区分 Postpone（挂起）和 Test（实际依赖外部未关闭）。
    每个卡点需说明阻塞原因（如依赖高通、日志不全、需特殊环境等）。

    ## 新增章节一：待分析问题（Analysis 状态）
    这些 Bug 状态为 Analysis，正在分析中，无最终结论。
    **必须全部列出这些 Bug**（数量少所以不限制为前 15 条）。
    表格格式：
    | Bug ID | 问题现象 | 分类 | 分析进展/当前状态 |
    并在表格后标注："> 这些问题适合作为工作流二的输入，下载对应日志进行分层分析"
    
    ## 新增章节二：待确认问题（Confirm 状态）
    这些 Bug 状态为 Confirm，修复方案已提交但仍在确认中，无最终结论。
    **必须全部列出这些 Bug**。
    表格格式：
    | Bug ID | 问题现象 | 分类 | 待确认事项 |

    ## 第三章：核心问题分类统计（精校后分类）
    表格格式为：
    | 根因大类 | 数量 | 占比 | 处理状态 |
    占比 = 该大类 Bug 数 / 总 Bug 数 × 100%。
    处理状态说明当前收敛情况（已修复/依赖高通/挂起等）。
    最后要计算「无法复现率 = 无法复现数 / 总 Bug 数 × 100%」。

    注意：标注了"建议人工复核"的低置信度 Bug 要在报告中特别说明。
    
    注意⚠️: 第一章和第二章展示每个分类前 15 条 Bug 为例。
    全量 Bug 清单位置: 后处理脚本从 classification_data.json 自动生成附录。
  expected_output: >
    完整的 Markdown 格式输出，包含：
    1. 第一章 ~ 第三章的标准报告内容
    2. 末尾附加如下格式的 LLM 精校记录：

    ```
    ## 方案B LLM精校记录
    
    | Bug ID | 原分类 | 精校后分类 | 置信度 | 变更原因/判断依据 |
    |--------|--------|-----------|--------|-----------------|
    | BUGxxx | QNX-SAIL | 硬件-电源/供电 | 高 | NOT "不是SAIL问题"语义被工具忽略 |
    | BUGyyy | 需人工判断 | 应用crash-ANR | 中 | Comments提到"应用无响应" |
    
    - 总精校数: N 条
    - 分类变更: M 条
    - 主要修正模式: 否定语义误分、兜底遗漏细化、跨层误判
    - 低置信度待复核: K 条（详见上表）
    - **精校变更率**: 分类变更 M / 总精校 N（%= M/N×100%）
      - 如果变更率 >30%，追加 "⚠️ 分类工具需调优：变更率 X%，主要修正模式为 xxx"
    ```

    Bug 数据直接从 data_analyst 的结构化摘要中提取，不要编造不存在的数据。
  agent: issue_refiner
  output_file: outputs/refined_chapters.md

experience_save_task:
  description: >
    读取 outputs/classification_data.json，把本轮精校识别的问题分类经验写入经验库。
    严禁使用模拟/虚构数据；如果文件缺失、读取失败或解析失败，必须直接报错并终止，不允许继续写入。

    **执行步骤（必须全部完成）：**

    步骤1: 读取 outputs/classification_data.json，取出其中 status 为 "new" 或 "changed"
           的条目（即本轮新增和变更的问题）。

    步骤2: 对每一条条目，调用「经验库更新」工具，入参字段如下：
           - project: 从 .env 读取 PROJECT_NAME（如 "8295_B70KS_国内"），不要使用 classification_data.json 的 project 字段
           - category: root_cause_category 字段
           - root_cause: parsed_root_cause 字段（如为空则用 category 代替）
           - solution: 根据 fix_status 和 comments 字段推断（已修复的写修复方案，未修复的写"待修复"）
           - keywords: matched_keywords 字段（列表转逗号分隔字符串）
           - summary: summary 字段（问题现象摘要）
           - confidence: llm_confidence 字段（high/medium/low），如字段不存在默认 "medium"

    步骤3: 汇总结果，统计：
           - 成功写入: N 条
           - 已存在跳过: M 条
           - 失败: K 条（如有，写明原因）

    注意：classification_data.json 如果没有 status 字段，则对所有条目执行写入。
    如果文件不存在，输出错误信息并终止。
  expected_output: >
    经验库写入汇总报告（纯文本），格式如下：

    ## 经验库写入结果

    - 本轮处理条目: X 条（new=A, changed=B）
    - 成功写入: N 条
    - 已存在跳过: M 条
    - 失败: K 条

    ### 写入详情
    | 序号 | category | root_cause | 结果 |
    |------|----------|-----------|------|
    | 1    | QNX-SAIL | safetymonitor超时 | 成功 |
    | 2    | 应用crash | ANR-输入超时 | 已存在,跳过 |

    写入完成，经验库已更新。
  agent: experience_saver

report_task:
  description: >
    基于前两个任务的输出（含精校后的分类），生成最终《黑卡闪问题提炼分析报告》。
    输入文件固定为：
    - outputs/refined_chapters.md（issue_refiner 的输出）
    - outputs/classification_data.json（结构化数据）
    - outputs/experience_save_report.md（经验库写入结果）
    禁止读取不存在的文件名（例如 outputs/issue_refiner_report.md）。

    **增量模式（重要）:**
    本次增量过滤数量见 outputs/classification_data.json 的 new_count/changed_count/skipped_count 字段。
    - 报告结构和统计覆盖全量数据（统计数字基于全量）
    - 但经验提炼（第四章）应聚焦新增和变更中发现的新模式，不要重复提炼已分析过的老问题
    - 如果新增=0 且变更=0，经验章节可以写"本轮无新增问题"
    - 如果新增+变更 ≤ 10 条，精度覆盖每一条的详情；如果 >50 条，按分类聚合

    报告结构（严格按此格式，标题需逐字一致，不得新增/删除/改名章节）：

    ```
    # 黑卡闪问题提炼分析报告

    > 数据来源：{excel_path}
    > 状态说明：Closed=已关闭/已验证 | Test=修复后待验证 | Postpone=挂起(依赖外部/无法复现)<br/>
    > Analysis=分析中(无结论,适合工作流二) | Confirm=待确认(无结论,暂存)
    > 增量模式：本次新分析 {new_count} 条，跳过已分析 {skipped_count} 条

    ---

    ## 一、已修复的问题及原因
    （直接使用 issue_refiner 第一章的输出，注意内含精校前后的分类差异注释）

    ## 二、未修复/挂起的问题
    （直接使用 issue_refiner 第二章的输出）

    ## 三、待分析（Analysis 状态）
    （直接使用 issue_refiner「新增章节一」的输出）
    > 这些问题的原始状态为 Analysis，正在分析中。适合作为工作流二输入。

    ## 四、待确认（Confirm 状态）
    （直接使用 issue_refiner「新增章节二」的输出）
    > 这些问题仍在确认流程中，暂无最终结论。

    ## 五、核心问题分类统计
    （直接使用 issue_refiner 第三章的输出，加上精校影响说明）

    ## 六、需要提炼的经验点
    从已分类的 Bug 中识别模式和经验教训。提炼规则：
    - P0：同一根因 >= 3 条独立 Bug → 必须提炼，标注为 High
    - P1：同一根因 >= 2 条且影响 Case 7 → 提炼
    - P2：同一根因 >= 2 条跨模块 → 提炼
    - P3：单一 Bug 但根因典型 → 可选
    经验格式（必须按 design_lessons 表字段组织）：
    ### 经验N：标题
    - lesson_title: （标题）
    - phenomenon: （现象）
    - root_cause: （痛点/根因）
    - design_suggestion: （建议）
    - arch_layer: MCU / QNX / Android / 跨层
    - arch_module: （具体模块）
    - priority: P0 / P1 / P2 / P3
    - source_bug_ids: [BUG-xxx, BUG-yyy]
    - project: （由工具固定使用 .env 的 PROJECT_NAME）
    - version: （若无则空）
    - arch_doc_url: （若无则空）

    **【第四章完成后：写入设计经验库（必须执行，不可跳过）】**
    对第四章中提炼出的每一条经验，按以下步骤操作：

    步骤A：先调用「design_lesson_query」工具，以经验标题关键词检索，确认库中是否已有相似条目。
    步骤B：如无重复，调用「design_lesson_save」工具逐条写入，字段映射规则：
      - lesson_title      → 必须原样使用第四章标题（`### 经验N：` 后的文字），禁止改写/同义替换/压缩
      - phenomenon        → 现象描述
      - root_cause        → 痛点/根因
      - design_suggestion → 建议（这是核心，必须包含可操作的改进措施）
      - arch_layer        → 根据根因定位层次填写：MCU / QNX / Android / 跨层
      - arch_module       → 关联的具体模块（如 QNX/SAIL、Android/SurfaceFlinger、MCU/Watchdog）
      - priority          → 按提炼规则对应：P0 / P1 / P2 / P3
      - source_bug_ids    → 该经验来源的所有 Bug ID 列表
      - project           → 固定使用 .env 的 PROJECT_NAME（工具侧强制），不要用其他来源
      - version           → 可选，无版本信息时传空字符串
      - arch_doc_url      → 可选，无文档链接时传空字符串
    步骤C：如已有相似条目，判断新经验是否有增量信息（新Bug ID / 更完善的建议）→ 仍调用「design_lesson_save」更新。
    步骤D：全部写入后做一致性对账：将第四章全部标题与服务端返回/回查结果逐条比对，
           输出“写入成功标题列表”和“缺失标题列表”；缺失列表非空时必须在报告中标红告警。
    覆盖目标：第四章每一条经验均需完成写入，一条不能遗漏。
    全部写入完成后，在报告末尾追加统计行：「> 本次写入设计经验库 X 条（新增 Y 条，更新 Z 条）」。

    ## 七、总结
    | 维度 | 结论 |
    |------|------|
    | **已修复** | 哪些大类基本收敛 |
    | **未修复/卡点** | 残留风险（包括 Postpone/Test/Review 等挂起状态） |
    | **待分析（Analysis）** | Analysis 状态问题的处理建议：是否适合作为工作流二输入 |
    | **待确认（Confirm）** | Confirm 状态问题的处理建议 |
    | **最大风险** | 影响面最大的问题 |
    | **最需改进** | 流程/工具/架构改进项 |
    | **工具建设** | 工具链建议 |
    | **精校影响** | LLM二次精校纠正了多少条、主要修正了哪些误分类 |
    | **日志覆盖率** | 有日志可分析的问题占比，以及无日志问题的处理建议 |

    ```

    **要求：**
    - 不要用代码块包裹整个报告
    - 表格格式严格对齐
    - 每条经验必须关联具体 Bug ID
    - 禁止编造 Excel 中不存在的字段或 Bug
    - 不要添加不存在的外部文件引用；若提到附录，仅允许固定文案「完整 Bug 清单见【附录：各分类完整 Bug 清单】」
    - 在总结表中加入「精校影响」维度，说明方案B LLM精校对分类的修正效果
    - 精校数据来自 issue_refiner 末尾的「方案B LLM精校记录」表格
    - ⚠️ **质量门禁**: 如果精校变更率超过 30%（分类变更数 / 总精校数 × 100%），
      在总结的「最需改进」维度中追加标注 "⚠️ 分类工具需调优：LLM 精校变更率 X%，
      主要修正模式为 xxx，建议检查 FINE_GRAINED_RULES 关键词覆盖度"
    - ⚠️ **报告完整性**: 第一章和第二章的 Bug 清单展示 issue_refiner 输出的示例 Bug（最多前 15 条/类）。
      全量 Bug 清单由后处理脚本从 JSON 自动生成附录，附加到报告尾部。
      章节末尾统一使用固定文案：
      "> 完整 Bug 清单见【附录：各分类完整 Bug 清单】"
  expected_output: >
    Markdown 格式的完整《黑卡闪问题提炼分析报告》，符合上述七段式结构。
  agent: report_writer
  output_file: outputs/report_refined.md

# ── 工作流二：Analysis 状态问题下载分析 ──
download_logs_task:
  description: >
    从 Excel 中筛选 status=Analysis 的问题（使用 BugTracker 过滤已下载过的）。
    对每个问题：
    1. 从 Actual Result 列提取日志 NAS 路径
    2. 使用 LogDownloadTool 检查权限并下载
    3. 无权限的记录下来，不阻塞流程

    输出格式：
    ```
    ## 日志下载结果

    | Bug ID | 标题 | 状态 | 文件数 |
    |--------|------|------|--------|
    | BUG-xxx | ... | ✅ 已下载 | 185 |
    | BUG-yyy | ... | ❌ 无权限 | - |
    ```

    下载到 T1Q黑卡闪问题分析/<BugID>_<问题描述>/ 目录。
  expected_output: >
    下载结果汇总表 + 各问题下载状态。下载完成后列出所有本地日志目录的路径。
  agent: log_downloader

analyze_mcu_task:
  description: >
    分析已下载日志的 MCU 层（mcu/、mcu_security/、vehicle_spi_log/ 目录）。

    检查项：
    - pshold 是否被拉低（pshold=0 → MCU 触发复位）
    - SPI 通信心跳消息 5501/80 是否缺失
    - MCU 功能安全事件（safety fault）
    - 电源状态异常

    如果发现明确的根因 → 直接输出结论，标注 layer=MCU，不需要后续 QNX/Android 分析。
    如果 MCU 层正常 → 输出"MCU 层未发现异常，继续 QNX 分析"。
  expected_output: >
    MCU 层分析结果：发现的问题 / 或 "未发现异常"。如果发现根因则给出结论和置信度。
  agent: log_analyzer_mcu

analyze_qnx_task:
  description: >
    分析已下载日志的 QNX 层（qnx/、qnx_security/、kernellog/ 目录）。
    仅在 MCU 层未发现根因时执行。

    检查项：
    - SAIL/safetymonitor 75ms 响应超时
    - IDPS/Kernel crash 事件
    - emac/io-sock 驱动异常（寻找 io-sock.cor 文件）
    - NOC Error / DDR 错误
    - 系统启动时序异常

    如果发现明确的根因 → 直接输出结论，标注 layer=QNX。
    如果 QNX 层正常 → 输出"QNX 层未发现异常，继续 Android 分析"。
  expected_output: >
    QNX 层分析结果：发现的问题 / 或 "未发现异常"。如果发现根因则给出结论和置信度。
  agent: log_analyzer_qnx

analyze_android_task:
  description: >
    分析已下载日志的 Android 层（logcat/、anr/、tombstones/ 目录）。
    仅在 MCU 和 QNX 层均未发现根因时执行。

    检查项：
    - ANR traces → 哪个组件超时
    - Native Crash tombstones → signal + backtrace
    - SurfaceFlinger 异常（Too many open files → FD 泄漏）
    - Java Crash（FATAL EXCEPTION、NullPointerException）
    - ContentObserver 泄漏
    - PAG/动画库异常
    - 应用进程 freeze/冻结

    综合 MCU/QNX/Android 三层分析结果，给出最终根因推断和置信度。
  expected_output: >
    Android 层分析结果 + 三层次综合分析结论（含置信度：高/中/低）。
  agent: log_analyzer_android

publish_report_task:
  description: >
    汇总所有分析结果，生成 Markdown 格式的分析报告。

    报告模板：
    ```
    # 黑卡闪问题日志分析报告

    ## 基本信息
    - Bug ID: <bug_id>
    - 标题: <title>
    - 负责人: <assignee>
    - 问题时间: <timestamp>

    ## 分析结论
    - 根因分类: <category>
    - 根因描述: <root_cause>
    - 置信度: <confidence>（高/中/低）
    - 定位层次: <layer>（MCU/QNX/Android）

    ## 分层分析详情
    ### MCU 层
    <mcu_findings>

    ### QNX 层
    <qnx_findings>

    ### Android 层
    <android_findings>

    ## 关键证据
    <evidence>

    ## 建议对策
    <recommendations>

    ## 待确认事项
    <open_items>
    ```

    报告保存到 reports/<bug_id>_analysis.md。
  expected_output: >
    完整的分析报告 Markdown 文件路径。
  agent: report_publisher
  output_file: reports/<bug_id>_analysis.md
